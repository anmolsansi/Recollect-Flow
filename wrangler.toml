name = "recollect-flow"
main = "apps/worker-api/src/index.ts"
compatibility_date = "2026-07-18"
workers_dev = true
preview_urls = false

[[d1_databases]]
binding = "DB"
database_name = "recollect-flow-prod"
database_id = "5fcba514-d0f7-45e7-a632-d4c59233af71"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "ATTACHMENTS"
bucket_name = "recollect-flow-attachments-prod"

[ai]
binding = "AI"

[secrets]
required = ["CAPTURE_TOKEN", "ADMIN_TOKEN", "NOTION_ACCESS_TOKEN", "TELEGRAM_BOT_TOKEN", "TELEGRAM_CHAT_ID"]

[vars]
NOTION_DATABASE_ID = "3a21b726-4ada-80a3-bfe1-ef808e3c293f"
MAX_ATTACHMENT_BYTES = "25000000"
UPLOAD_TTL_SECONDS = "3600"

[triggers]
crons = ["17 * * * *"]
